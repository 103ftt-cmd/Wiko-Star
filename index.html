<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wiko Star - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #000; margin: 0; overflow: hidden; color: white; }
        .video-bg { background: linear-gradient(45deg, #1a1a1a, #000); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.FramerMotion;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [page, setPage] = useState('home');
            const [showSettings, setShowSettings] = useState(false);

            return (
                <div className="h-[100dvh] flex flex-col bg-black relative overflow-hidden">
                    {/* Header */}
                    <div className="absolute top-0 w-full z-50 p-4 pt-10 flex justify-between items-center bg-gradient-to-b from-black/60 to-transparent">
                        <div className="bg-yellow-500 p-2 rounded-xl text-black"><Icon name="camera" size={20}/></div>
                        <div className="text-center">
                            <h1 className="font-black italic text-lg">STAR WIKO</h1>
                            <p className="text-yellow-500 text-[8px] font-bold tracking-tighter">OFFICIAL APP</p>
                        </div>
                        <div className="flex gap-4"><Icon name="bell"/><Icon name="search"/></div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1">
                        {page === 'home' && (
                            <div className="h-full w-full video-bg relative flex items-center justify-center">
                                {/* تم استبدال الصورة بخلفية ملونة لضمان عدم ظهور سواد في حال فشل التحميل */}
                                <div className="absolute inset-0 bg-gradient-to-tr from-zinc-900 to-black"></div>
                                <Icon name="play" size={60} className="text-white/20" />
                                
                                {/* Right Icons - 5 icons */}
                                <div className="absolute right-4 bottom-24 flex flex-col items-center gap-6 z-50">
                                    <div className="w-12 h-12 rounded-full border-2 border-white bg-zinc-800 flex items-center justify-center">AY</div>
                                    <div className="flex flex-col items-center"><Icon name="heart" size={32}/><span className="text-xs font-bold">2.5M</span></div>
                                    <div className="flex flex-col items-center"><Icon name="message-circle" size={32}/><span className="text-xs font-bold">45K</span></div>
                                    <div className="flex flex-col items-center"><Icon name="share-2" size={32}/><span className="text-xs font-bold">مشاركة</span></div>
                                    <div className="w-10 h-10 rounded-full border-2 border-zinc-500 flex items-center justify-center animate-spin-slow"><Icon name="music" size={18}/></div>
                                </div>

                                <div className="absolute bottom-24 left-4 right-20">
                                    <p className="font-bold text-lg mb-1">@احمد يامي <Icon name="check-circle" size={14} className="inline text-blue-400"/></p>
                                    <p className="text-sm opacity-80">مرحباً بكم في تطبيق ويكو ستار الرسمي 🌟 #ويكو_ستار</p>
                                </div>
                            </div>
                        )}

                        {page === 'profile' && (
                            <div className="p-6 pt-24 h-full overflow-y-auto no-scrollbar">
                                <div className="flex justify-between mb-8">
                                    <button onClick={() => setShowSettings(true)}><Icon name="settings"/></button>
                                    <span className="font-black">الملف الشخصي</span>
                                    <Icon name="qr-code"/>
                                </div>
                                <div className="flex flex-col items-center mb-8">
                                    <div className="w-24 h-24 rounded-full border-4 border-yellow-500 flex items-center justify-center text-3xl font-black bg-zinc-800 mb-4">AY</div>
                                    <span className="font-black text-xl">أحمد يامي</span>
                                    <span className="text-zinc-500 font-bold">@aamr1003</span>
                                </div>
                                <div className="flex justify-around bg-zinc-900/50 py-4 rounded-3xl mb-6">
                                    <div className="text-center"><p className="font-black">128</p><p className="text-xs text-zinc-500">متابعة</p></div>
                                    <div className="text-center"><p className="font-black">45K</p><p className="text-xs text-zinc-500">متابع</p></div>
                                    <div className="text-center"><p className="font-black">1M</p><p className="text-xs text-zinc-500">إعجاب</p></div>
                                </div>
                                <button className="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black">تعديل الملف الشخصي</button>
                            </div>
                        )}
                    </div>

                    {/* Navbar - 5 Icons */}
                    <div className="h-20 bg-black border-t border-white/10 flex justify-around items-center px-2 z-50">
                        <button onClick={() => setPage('home')} className={page === 'home' ? 'text-yellow-500' : 'text-zinc-500'}><Icon name="home"/><span className="text-[10px] block font-bold">الرئيسية</span></button>
                        <button onClick={() => setPage('chat')} className="text-zinc-500"><Icon name="message-square"/><span className="text-[10px] block font-bold">دردشة</span></button>
                        <div className="bg-yellow-500 p-3 rounded-2xl -mt-8 text-black shadow-lg"><Icon name="plus" size={28}/></div>
                        <button onClick={() => setPage('radar')} className="text-zinc-500"><Icon name="star"/><span className="text-[10px] block font-bold">رادار</span></button>
                        <button onClick={() => setPage('profile')} className={page === 'profile' ? 'text-yellow-500' : 'text-zinc-500'}><Icon name="user"/><span className="text-[10px] block font-bold">ملفي</span></button>
                    </div>

                    {/* Settings Modal */}
                    <AnimatePresence>
                        {showSettings && (
                            <motion.div initial={{ y: '100%' }} animate={{ y: 0 }} exit={{ y: '100%' }} className="fixed inset-0 z-[100] bg-black p-6 pt-12 overflow-y-auto">
                                <div className="flex items-center justify-between mb-8">
                                    <button onClick={() => setShowSettings(false)} className="bg-zinc-900 p-2 rounded-full"><Icon name="chevron-left" /></button>
                                    <h2 className="font-black text-xl">الإعدادات</h2>
                                    <div className="w-10"></div>
                                </div>
                                <div className="space-y-4">
                                    {[
                                        ["الاسم", "أحمد يامي"], ["اسم المستخدم", "aamr1003"],
                                        ["تاريخ الميلاد", "1999/8/9"], ["رقم الهاتف", "050 47*****"]
                                    ].map(([label, val]) => (
                                        <div className="flex justify-between border-b border-white/5 py-4" key={label}>
                                            <span className="text-zinc-400 font-bold">{label}</span>
                                            <span className="font-bold">{val}</span>
                                        </div>
                                    ))}
                                    <button className="w-full py-4 bg-red-500/10 text-red-500 rounded-2xl font-black mt-10">تسجيل الخروج</button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
