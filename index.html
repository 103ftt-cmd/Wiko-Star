<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wiko Star - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #000; 
            margin: 0; 
            overflow: hidden; 
            color: white; 
            user-select: none;
        }
        .main-gradient {
            background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .animate-slow-spin {
            animation: spin 6s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [activePage, setActivePage] = useState('home');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);

            return (
                <div className="h-[100dvh] flex flex-col bg-black relative overflow-hidden max-w-md mx-auto">
                    
                    {/* Header العلوي */}
                    <div className="absolute top-0 w-full z-50 p-5 pt-12 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
                        <div className="bg-yellow-500 w-10 h-10 rounded-xl flex items-center justify-center text-black shadow-lg shadow-yellow-500/20">
                            <i className="fa-solid fa-camera text-lg"></i>
                        </div>
                        <div className="text-center">
                            <h1 className="font-black italic text-xl tracking-wider text-white">WIKO STAR</h1>
                            <p className="text-yellow-500 text-[9px] font-bold tracking-[0.2em] uppercase">Official Platform</p>
                        </div>
                        <div className="flex gap-5 text-white/90">
                            <i className="fa-solid fa-magnifying-glass text-xl"></i>
                            <i className="fa-solid fa-bell text-xl"></i>
                        </div>
                    </div>

                    {/* المحتوى الرئيسي */}
                    <div className="flex-1 overflow-hidden">
                        {activePage === 'home' ? (
                            <div className="h-full w-full relative main-gradient flex items-center justify-center">
                                {/* خلفية تفاعلية بدل الفيديو */}
                                <div className="absolute inset-0 opacity-40">
                                    <div className="absolute top-1/4 left-1/4 w-64 h-64 bg-yellow-500/10 rounded-full blur-[100px]"></div>
                                    <div className="absolute bottom-1/4 right-1/4 w-64 h-64 bg-yellow-600/10 rounded-full blur-[100px]"></div>
                                </div>

                                <i className="fa-solid fa-play text-white/10 text-8xl"></i>

                                {/* أزرار التفاعل الجانبية */}
                                <div className="absolute right-4 bottom-28 flex flex-col items-center gap-7 z-50">
                                    <div className="relative">
                                        <div className="w-14 h-14 rounded-full border-2 border-white bg-zinc-800 flex items-center justify-center font-bold text-yellow-500 shadow-xl">AY</div>
                                        <div className="absolute -bottom-2 bg-red-500 rounded-full w-5 h-5 flex items-center justify-center border-2 border-black left-1/2 -translate-x-1/2">
                                            <i className="fa-solid fa-plus text-[10px]"></i>
                                        </div>
                                    </div>
                                    <div className="text-center">
                                        <i className="fa-solid fa-heart text-3xl text-white"></i>
                                        <p className="text-xs font-bold mt-1">2.5M</p>
                                    </div>
                                    <div className="text-center">
                                        <i className="fa-solid fa-comment-dots text-3xl text-white"></i>
                                        <p className="text-xs font-bold mt-1">45K</p>
                                    </div>
                                    <div className="text-center">
                                        <i className="fa-solid fa-share text-3xl text-white"></i>
                                        <p className="text-xs font-bold mt-1">مشاركة</p>
                                    </div>
                                    <div className="w-12 h-12 rounded-full border-2 border-zinc-700 bg-black/50 flex items-center justify-center animate-slow-spin">
                                        <i className="fa-solid fa-compact-disc text-2xl text-yellow-500"></i>
                                    </div>
                                </div>

                                {/* معلومات الفيديو */}
                                <div className="absolute bottom-28 left-5 right-20 text-white">
                                    <h3 className="font-black text-xl mb-2 flex items-center gap-2">
                                        أحمد يامي 
                                        <i className="fa-solid fa-circle-check text-blue-400 text-sm"></i>
                                    </h3>
                                    <p className="text-sm leading-relaxed opacity-90 font-medium">
                                        مرحباً بكم في تطبيق ويكو ستار الرسمي 🌟 <br/>
                                        <span className="text-yellow-500">#ويكو_ستار #أحمد_يامي</span>
                                    </p>
                                </div>
                            </div>
                        ) : (
                            <div className="h-full w-full bg-black p-6 pt-24 overflow-y-auto">
                                <div className="flex justify-between items-center mb-10">
                                    <i className="fa-solid fa-gear text-2xl" onClick={() => setIsSettingsOpen(true)}></i>
                                    <span className="font-black text-lg">الملف الشخصي</span>
                                    <i className="fa-solid fa-qrcode text-2xl"></i>
                                </div>
                                
                                <div className="flex flex-col items-center mb-10">
                                    <div className="w-28 h-28 rounded-full border-4 border-yellow-500 p-1 mb-4 shadow-2xl shadow-yellow-500/10">
                                        <div className="w-full h-full rounded-full bg-zinc-900 flex items-center justify-center text-4xl font-black text-yellow-500">AY</div>
                                    </div>
                                    <h2 className="text-2xl font-black">أحمد يامي</h2>
                                    <p className="text-zinc-500 font-bold">@aamr1003</p>
                                </div>

                                <div className="flex justify-around bg-zinc-900/50 py-6 rounded-[30px] mb-8 border border-white/5">
                                    <div className="text-center"><p className="font-black text-xl">128</p><p className="text-xs text-zinc-500 font-bold mt-1">متابعة</p></div>
                                    <div className="text-center border-x border-white/10 px-8"><p className="font-black text-xl">45K</p><p className="text-xs text-zinc-500 font-bold mt-1">متابع</p></div>
                                    <div className="text-center"><p className="font-black text-xl">1M</p><p className="text-xs text-zinc-500 font-bold mt-1">إعجاب</p></div>
                                </div>

                                <button className="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black text-lg shadow-lg shadow-yellow-500/20 active:scale-95 transition-transform">
                                    تعديل الملف الشخصي
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Navbar السفلي */}
                    <div className="h-24 bg-black border-t border-white/5 flex justify-around items-center px-4 z-50">
                        <button onClick={() => setActivePage('home')} className={`flex flex-col items-center gap-1 ${activePage === 'home' ? 'text-yellow-500' : 'text-zinc-600'}`}>
                            <i className="fa-solid fa-house text-xl"></i>
                            <span className="text-[10px] font-black">الرئيسية</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-zinc-600">
                            <i className="fa-solid fa-message text-xl"></i>
                            <span className="text-[10px] font-black">دردشة</span>
                        </button>
                        <div className="bg-yellow-500 w-14 h-14 rounded-2xl -mt-12 flex items-center justify-center text-black shadow-xl shadow-yellow-500/30 border-4 border-black">
                            <i className="fa-solid fa-plus text-2xl"></i>
                        </div>
                        <button className="flex flex-col items-center gap-1 text-zinc-600">
                            <i className="fa-solid fa-compass text-xl"></i>
                            <span className="text-[10px] font-black">رادار</span>
                        </button>
                        <button onClick={() => setActivePage('profile')} className={`flex flex-col items-center gap-1 ${activePage === 'profile' ? 'text-yellow-500' : 'text-zinc-600'}`}>
                            <i className="fa-solid fa-user text-xl"></i>
                            <span className="text-[10px] font-black">ملفي</span>
                        </button>
                    </div>

                    {/* واجهة الإعدادات (Modal) */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 z-[100] bg-black p-6 pt-16 animate-in slide-in-from-bottom duration-300">
                            <div className="flex items-center mb-10">
                                <i className="fa-solid fa-chevron-right text-2xl" onClick={() => setIsSettingsOpen(false)}></i>
                                <h2 className="flex-1 text-center font-black text-xl ml-8">الإعدادات</h2>
                            </div>
                            <div className="space-y-2">
                                {[
                                    ["الاسم", "أحمد يامي"],
                                    ["اسم المستخدم", "aamr1003"],
                                    ["تاريخ الميلاد", "1999/8/9"],
                                    ["رقم الهاتف", "050 47*****"]
                                ].map(([label, val]) => (
                                    <div className="flex justify-between items-center p-5 bg-zinc-900/30 rounded-2xl border border-white/5" key={label}>
                                        <span className="text-zinc-400 font-bold">{label}</span>
                                        <span className="font-bold text-white">{val}</span>
                                    </div>
                                ))}
                                <button className="w-full py-5 bg-red-500/10 text-red-500 rounded-2xl font-black mt-10 border border-red-500/20">
                                    تسجيل الخروج
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
